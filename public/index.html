<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Escala</title>
  <link rel="stylesheet" href="./style.css" />
</head>
<body>
  <header class="top">
    <div class="top__left">
      <div class="brand" id="systemName">Escala Semanal de Praças do EM – 4º BPM/M</div>
      <div class="sub" id="period"></div>
    </div>
    <div class="top__right">
      <button id="btnPdf" class="btn">PDF</button>
      <button id="btnLogout" class="btn btn--ghost">sair</button>
    </div>
  </header>

  <div id="holidayBar" class="holiday" style="display:none;"></div>

  <main class="wrap">
    <section id="loginBox" class="card">
      <h1>acesso</h1>
      <label>
        GRADUAÇÃO + NOME DE GUERRA (MAIÚSCULO)
        <input id="loginName" />
      </label>
      <label>
        senha
        <input id="loginPass" type="password" />
      </label>
      <button id="btnLogin" class="btn btn--primary">entrar</button>
      <div class="muted" id="loginMsg"></div>
    </section>

    <section id="changeBox" class="card" style="display:none;">
      <h1>troca obrigatória de senha</h1>
      <label><input id="newPass1" type="password" /></label>
      <label><input id="newPass2" type="password" /></label>
      <button id="btnChange" class="btn btn--primary">salvar</button>
      <div id="changeMsg"></div>
    </section>

    <section id="appBox" class="card" style="display:none;">
      <div id="lockMsg"></div>
      <div id="userMsg"></div>

      <div id="legend"></div>

      <table id="table"></table>

      <button id="btnSave" class="btn btn--primary">salvar</button>
      <div id="saveMsg"></div>

      <div id="opsNotes"></div>
      <div id="descBox"><div id="descNotes"></div></div>

      <div id="historyBox" style="display:none;">
        <div id="historyTable"></div>
      </div>
    </section>
  </main>

  <script src="./app.js"></script>
</body>
</html>
